name: Régua de menu (rota × página)

# Trava no PR/pré-deploy: nenhum item de menu ativo pode ficar sem página real (404 silencioso).
# Nasce porque cadastrar módulo (module_catalog) e criar a página (src/app) são passos separados.
on:
  pull_request:
  workflow_dispatch:

jobs:
  check_menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Régua de menu (rotas × páginas)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run check:menu
