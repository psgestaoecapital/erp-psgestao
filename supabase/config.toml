project_id = "horsymhsinqcimflrtjo"

# verify_jwt por funcao · CLI lê esses settings ao deployar
# false = endpoint publico (valida internamente · ex: webhooks com HMAC)
# true  = exige JWT Supabase no Authorization header (default)

[functions.focus-nfe-webhook]
verify_jwt = false

[functions.gov-nfse-emitir]
# Fase de teste: verify_jwt=false pra simplificar invoke via curl com qualquer
# Authorization (ou nenhum). Quando entrar em producao real, mudar pra true
# e exigir JWT do usuario logado.
verify_jwt = false

[functions.gov-nfse-consultar]
# Chamado autenticado pela tela (supabase.functions.invoke ja injeta JWT).
verify_jwt = true
