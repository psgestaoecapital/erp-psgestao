project_id = "horsymhsinqcimflrtjo"

# verify_jwt por funcao · CLI lê esses settings ao deployar
# false = endpoint publico (valida internamente · ex: webhooks com HMAC)
# true  = exige JWT Supabase no Authorization header (default)

[functions.focus-nfe-webhook]
verify_jwt = false

[functions.gov-nfse-emitir]
# FEAT-NFSE-AUTOMACAO-v1: re-protegido. Frontend chama via
# supabase.functions.invoke (JWT user) · cron usa service_role (Bearer).
verify_jwt = true

[functions.gov-nfse-consultar]
# Chamado autenticado pela tela (JWT user) ou pelo cron (service_role).
verify_jwt = true

[functions.gov-nfse-flags]
# Tela autenticada checa disponibilidade de producao.
verify_jwt = true

[functions.pluggy-connect-token-financeiro]
# Tela autenticada chama via supabase.functions.invoke (JWT user).
verify_jwt = true
